<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Picks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e7;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 30px 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        input[type="text"] {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #3f3f46;
            border-radius: 12px;
            background: #27272a;
            color: #e4e4e7;
            width: 400px;
            max-width: 100%;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #7c3aed;
        }

        input[type="text"]::placeholder {
            color: #71717a;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #7c3aed, #00d4ff);
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Sort Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }

        .controls label {
            color: #a1a1aa;
            font-size: 0.9rem;
        }

        select {
            padding: 8px 15px;
            font-size: 0.9rem;
            border: 2px solid #3f3f46;
            border-radius: 8px;
            background: #27272a;
            color: #e4e4e7;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #a1a1aa;
            font-size: 0.9rem;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #7c3aed;
            cursor: pointer;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 25px;
            background: rgba(39, 39, 42, 0.8);
            border-radius: 16px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
            border: 1px solid #3f3f46;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-value.positive {
            color: #22c55e;
        }

        .stat-value.negative {
            color: #ef4444;
        }

        /* Cards Grid */
        .picks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .pick-card {
            background: linear-gradient(145deg, #27272a 0%, #1f1f23 100%);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #3f3f46;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .pick-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            margin-bottom: 15px;
        }

        .market-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f4f4f5;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-time {
            font-size: 0.75rem;
            color: #71717a;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .game-time::before {
            content: "⏰";
            font-size: 0.7rem;
        }

        /* League Badge */
        .league-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #3f3f46;
            color: #a1a1aa;
            margin-bottom: 8px;
        }

        .league-badge.nba { background: #1d428a; color: #fff; }
        .league-badge.nfl { background: #013369; color: #fff; }
        .league-badge.nhl { background: #000; color: #fff; }
        .league-badge.mlb { background: #002d72; color: #fff; }
        .league-badge.ncaa { background: #0033a0; color: #fff; }
        .league-badge.soccer { background: #326e41; color: #fff; }
        .league-badge.tennis { background: #4e9a06; color: #fff; }
        .league-badge.mma { background: #d20a0a; color: #fff; }
        .league-badge.intl { background: #7c3aed; color: #fff; }

        /* Outcome Badge */
        .outcome-badge {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
        }

        .outcome-badge.yes {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .outcome-badge.no {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .outcome-badge.team {
            background: linear-gradient(135deg, #3f3f46 0%, #27272a 100%);
            color: #e4e4e7;
        }

        /* Position Details */
        .position-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .detail {
            text-align: center;
        }

        .detail-label {
            font-size: 0.7rem;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e4e4e7;
            margin-top: 3px;
        }

        /* P&L Section */
        .pnl-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #3f3f46;
            margin-top: 15px;
        }

        .pnl {
            text-align: left;
        }

        .pnl-label {
            font-size: 0.7rem;
            color: #71717a;
            text-transform: uppercase;
        }

        .pnl-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .pnl-value.positive {
            color: #22c55e;
        }

        .pnl-value.negative {
            color: #ef4444;
        }

        .pnl-percent {
            font-size: 0.85rem;
            color: #a1a1aa;
        }

        .potential-payout {
            text-align: right;
        }

        .payout-label {
            font-size: 0.7rem;
            color: #71717a;
            text-transform: uppercase;
        }

        .payout-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00d4ff;
        }

        /* Loading & Error States */
        .loading, .error, .empty {
            text-align: center;
            padding: 60px 20px;
            color: #a1a1aa;
        }

        .loading::after {
            content: "";
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #3f3f46;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #ef4444;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .stats-bar {
                flex-direction: column;
                gap: 20px;
            }

            .input-group {
                flex-direction: column;
                align-items: center;
            }

            input[type="text"] {
                width: 100%;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>POLYMARKET PICKS</h1>
            <button id="loadBtn" onclick="loadPositions()">Refresh</button>
            <div class="controls">
                <label for="sortSelect">Sort by:</label>
                <select id="sortSelect" onchange="sortAndRender()">
                    <option value="gameTime-asc">Game Time (Soonest)</option>
                    <option value="gameTime-desc">Game Time (Latest)</option>
                    <option value="value-desc">Position Value (Highest)</option>
                    <option value="pnl-desc">P&L (Best)</option>
                    <option value="cost-desc">Cost Basis (Highest)</option>
                </select>
                <label class="checkbox-label">
                    <input type="checkbox" id="hideStartedCheckbox" onchange="sortAndRender()">
                    <span>Hide started games</span>
                </label>
            </div>
        </header>

        <div id="statsBar" class="stats-bar" style="display: none;">
            <div class="stat">
                <div class="stat-label">Portfolio Value</div>
                <div class="stat-value" id="totalValue">$0.00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total Cost</div>
                <div class="stat-value" id="totalCost">$0.00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total P&L</div>
                <div class="stat-value" id="totalPnl">$0.00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Open Positions</div>
                <div class="stat-value" id="positionCount">0</div>
            </div>
        </div>

        <div id="content">
            <div class="empty">
                <p>Enter your Polymarket wallet address to view your picks</p>
            </div>
        </div>
    </div>

    <script>
        const WALLET = '0xe315130229dcf148e87555a6722baf8770dd3911';
        let positions = [];

        // League/Sport mapping based on slug prefixes
        const leagueMap = {
            // US Major Leagues
            'nba': { name: 'NBA', class: 'nba' },
            'nfl': { name: 'NFL', class: 'nfl' },
            'nhl': { name: 'NHL', class: 'nhl' },
            'mlb': { name: 'MLB', class: 'mlb' },
            'mls': { name: 'MLS', class: 'soccer' },
            // College Sports
            'cbb': { name: 'NCAA Basketball', class: 'ncaa' },
            'cfb': { name: 'NCAA Football', class: 'ncaa' },
            'ncaa': { name: 'NCAA', class: 'ncaa' },
            // International Basketball
            'bkcba': { name: 'CBA (China)', class: 'intl' },
            'bkeur': { name: 'EuroLeague', class: 'intl' },
            'bkaus': { name: 'NBL (Australia)', class: 'intl' },
            // Soccer/Football
            'epl': { name: 'Premier League', class: 'soccer' },
            'laliga': { name: 'La Liga', class: 'soccer' },
            'seria': { name: 'Serie A', class: 'soccer' },
            'bundesliga': { name: 'Bundesliga', class: 'soccer' },
            'ligue1': { name: 'Ligue 1', class: 'soccer' },
            'ucl': { name: 'Champions League', class: 'soccer' },
            'fifa': { name: 'FIFA', class: 'soccer' },
            // Combat Sports
            'ufc': { name: 'UFC', class: 'mma' },
            'boxing': { name: 'Boxing', class: 'mma' },
            'mma': { name: 'MMA', class: 'mma' },
            // Tennis
            'atp': { name: 'ATP Tennis', class: 'tennis' },
            'wta': { name: 'WTA Tennis', class: 'tennis' },
            'tennis': { name: 'Tennis', class: 'tennis' },
            // Other
            'pga': { name: 'PGA Golf', class: 'ncaa' },
            'f1': { name: 'Formula 1', class: 'intl' },
            'nascar': { name: 'NASCAR', class: 'ncaa' },
        };

        function getLeagueFromSlug(slug) {
            if (!slug) return { name: 'Sports', class: '' };
            const prefix = slug.split('-')[0].toLowerCase();
            return leagueMap[prefix] || { name: prefix.toUpperCase(), class: '' };
        }

        document.addEventListener('DOMContentLoaded', loadPositions);

        async function loadPositions() {
            const content = document.getElementById('content');
            const statsBar = document.getElementById('statsBar');
            const loadBtn = document.getElementById('loadBtn');

            content.innerHTML = '<div class="loading"><p>Loading your picks...</p></div>';
            statsBar.style.display = 'none';
            loadBtn.disabled = true;

            try {
                const response = await fetch(
                    `https://data-api.polymarket.com/positions?user=${WALLET}&sizeThreshold=0&redeemable=false&limit=500`
                );

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                positions = await response.json();

                if (positions.length === 0) {
                    content.innerHTML = '<div class="empty"><p>No open positions found for this wallet</p></div>';
                    loadBtn.disabled = false;
                    return;
                }

                // API already filters to redeemable=false; exclude any zero-value stragglers
                const openPositions = positions.filter(p => (p.currentValue || 0) > 0);

                const totalValue = openPositions.reduce((sum, p) => sum + (p.currentValue || 0), 0);
                const totalCost = openPositions.reduce((sum, p) => sum + (p.initialValue || 0), 0);
                const totalPnl = openPositions.reduce((sum, p) => sum + (p.cashPnl || 0), 0);

                document.getElementById('totalValue').textContent = formatCurrency(totalValue);
                document.getElementById('totalCost').textContent = formatCurrency(totalCost);

                const pnlElement = document.getElementById('totalPnl');
                const pnlPercent = totalCost > 0 ? ((totalPnl / totalCost) * 100).toFixed(1) : 0;
                pnlElement.textContent = `${formatCurrency(totalPnl)} (${pnlPercent > 0 ? '+' : ''}${pnlPercent}%)`;
                pnlElement.className = `stat-value ${totalPnl >= 0 ? 'positive' : 'negative'}`;

                document.getElementById('positionCount').textContent = openPositions.length;
                statsBar.style.display = 'flex';

                sortAndRender();
            } catch (error) {
                console.error('Error fetching positions:', error);
                content.innerHTML = `<div class="error"><p>Error loading positions: ${error.message}</p></div>`;
            } finally {
                loadBtn.disabled = false;
            }
        }

        function sortAndRender() {
            const sortValue = document.getElementById('sortSelect').value;
            const [sortBy, direction] = sortValue.split('-');
            const hideStarted = document.getElementById('hideStartedCheckbox').checked;

            // API already returns only redeemable=false; exclude any zero-value stragglers
            let filtered = positions.filter(p => (p.currentValue || 0) > 0);

            // Hide games that started more than 3 hours ago
            if (hideStarted) {
                const now = new Date().getTime();
                const threeHoursMs = 3 * 60 * 60 * 1000;
                filtered = filtered.filter(p => {
                    const gameTime = new Date(p.gameStartTime || p.endDate || '2099-12-31').getTime();
                    return now <= gameTime + threeHoursMs;
                });
            }

            const sorted = [...filtered].sort((a, b) => {
                let aVal, bVal;

                switch (sortBy) {
                    case 'gameTime':
                        aVal = new Date(a.gameStartTime || a.endDate || '2099-12-31').getTime();
                        bVal = new Date(b.gameStartTime || b.endDate || '2099-12-31').getTime();
                        break;
                    case 'value':
                        aVal = a.currentValue || 0;
                        bVal = b.currentValue || 0;
                        break;
                    case 'pnl':
                        aVal = a.cashPnl || 0;
                        bVal = b.cashPnl || 0;
                        break;
                    case 'cost':
                        aVal = a.initialValue || 0;
                        bVal = b.initialValue || 0;
                        break;
                    default:
                        return 0;
                }

                return direction === 'asc' ? aVal - bVal : bVal - aVal;
            });

            document.getElementById('positionCount').textContent = filtered.length;

            renderPositions(sorted);
        }

        function renderPositions(positionsToRender) {
            const content = document.getElementById('content');

            const html = `
                <div class="picks-grid">
                    ${positionsToRender.map(pos => createPickCard(pos)).join('')}
                </div>
            `;

            content.innerHTML = html;
        }

        function createPickCard(position) {
            const outcomeClass = position.outcomeIndex === 0 ? 'yes' : 'no';
            const pnl = position.cashPnl || 0;
            const pnlPercent = position.percentPnl || 0;
            const potentialPayout = (position.size || 0);
            const gameTime = formatGameTime(position.gameStartTime || position.endDate);
            const league = getLeagueFromSlug(position.slug);

            return `
                <div class="pick-card">
                    <div class="card-header">
                        <span class="league-badge ${league.class}">${league.name}</span>
                        <div class="market-title">${escapeHtml(position.title || 'Unknown Market')}</div>
                        <div class="game-time">${gameTime}</div>
                    </div>

                    <span class="outcome-badge ${outcomeClass}">${position.outcome || 'N/A'}</span>

                    <div class="position-details">
                        <div class="detail">
                            <div class="detail-label">Shares</div>
                            <div class="detail-value">${formatNumber(position.size)}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Avg Price</div>
                            <div class="detail-value">${formatPrice(position.avgPrice)}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Current Price</div>
                            <div class="detail-value">${formatPrice(position.curPrice)}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Cost Basis</div>
                            <div class="detail-value">${formatCurrency(position.initialValue)}</div>
                        </div>
                    </div>

                    <div class="pnl-section">
                        <div class="pnl">
                            <div class="pnl-label">P&L</div>
                            <div class="pnl-value ${pnl >= 0 ? 'positive' : 'negative'}">
                                ${pnl >= 0 ? '+' : ''}${formatCurrency(pnl)}
                            </div>
                            <div class="pnl-percent">${pnlPercent >= 0 ? '+' : ''}${(pnlPercent * 100).toFixed(1)}%</div>
                        </div>
                        <div class="potential-payout">
                            <div class="payout-label">Pays if Correct</div>
                            <div class="payout-value">${formatCurrency(potentialPayout)}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function formatCurrency(value) {
            if (value == null) return '$0.00';
            return '$' + Math.abs(value).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatPrice(value) {
            if (value == null) return '$0.00';
            return '$' + value.toFixed(2);
        }

        function formatNumber(value) {
            if (value == null) return '0';
            return value.toLocaleString('en-US', { maximumFractionDigits: 2 });
        }

        function formatGameTime(dateString) {
            if (!dateString) return 'No date set';

            const date = new Date(dateString);
            if (isNaN(date.getTime())) return 'No date set';

            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const isTomorrow = date.toDateString() === tomorrow.toDateString();

            const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

            if (isToday) {
                return `Today, ${timeStr}`;
            } else if (isTomorrow) {
                return `Tomorrow, ${timeStr}`;
            } else {
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `${dateStr}, ${timeStr}`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

    </script>
</body>
</html>
